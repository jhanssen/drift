<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>drift editor</title>
<style>
  :root {
    --bg: #16181d; --panel: #1e2128; --edge: #2c3038;
    --text: #d6d9de; --dim: #8a8f98; --accent: #6aa1ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg);
               color: var(--text);
               font: 13px/1.45 system-ui, sans-serif; }
  body { display: grid; grid-template-columns: 1fr 340px; }
  main { display: flex; flex-direction: column; min-width: 0; }
  #canvas { flex: 1; width: 100%; min-height: 0; display: block;
            background: #000; }
  #transport { display: flex; align-items: center; gap: 12px;
               padding: 6px 12px; border-top: 1px solid var(--edge);
               background: var(--panel); }
  #transport button { width: 34px; }
  #timeText { color: var(--dim); font-variant-numeric: tabular-nums;
              min-width: 70px; }
  #timeline { border-top: 1px solid var(--edge); background: var(--panel);
              max-height: 280px; overflow-y: auto; padding: 8px 12px; }
  #timeline canvas { cursor: crosshair; }
  #keyEdit { position: fixed; z-index: 10; display: flex; gap: 6px;
             background: var(--panel); border: 1px solid var(--accent);
             border-radius: 5px; padding: 6px 8px; font-size: 12px;
             box-shadow: 0 4px 14px rgba(0,0,0,.5); }
  #keyEdit[hidden] { display: none; }
  #keyEdit label { display: flex; align-items: center; gap: 4px;
                   color: var(--dim); }
  #keyEdit input { width: 72px; }
  #timeline .dim { color: var(--dim); }
  #timeline h3 { font-size: 11px; margin: 6px 0 4px; color: var(--dim);
                 font-weight: normal; letter-spacing: .04em; }
  #timeline canvas { display: block; width: 100%; }
  #statusbar { padding: 6px 12px; border-top: 1px solid var(--edge);
               color: var(--dim); display: flex; gap: 18px;
               white-space: nowrap; overflow: hidden; }
  aside { border-left: 1px solid var(--edge); background: var(--panel);
          overflow-y: auto; padding: 14px; }
  h1 { font-size: 14px; margin: 0 0 14px; letter-spacing: .02em; }
  h1 span { color: var(--dim); font-weight: normal; }
  section { margin-bottom: 20px; }
  section > h2 { font-size: 11px; text-transform: uppercase;
                 letter-spacing: .08em; color: var(--dim); margin: 0 0 8px; }
  .row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .row label { flex: 0 0 110px; overflow: hidden; text-overflow: ellipsis;
               white-space: nowrap; }
  input, select, button {
    font: inherit; color: var(--text); background: var(--bg);
    border: 1px solid var(--edge); border-radius: 4px; padding: 3px 6px;
  }
  input[type=range] { flex: 1; padding: 0; }
  input[type=number] { width: 64px; }
  input[type=color] { padding: 0; width: 44px; height: 24px; }
  textarea { width: 100%; font: 11px/1.4 ui-monospace, monospace;
             color: var(--text); background: var(--bg);
             border: 1px solid var(--edge); border-radius: 4px;
             padding: 6px; resize: vertical; }
  #wgslStatus { font-size: 11px; white-space: pre-wrap; }
  button { cursor: pointer; }
  button:hover { border-color: var(--accent); }
  .ok { color: #7fd490; } .bad { color: #e0787d; } .warn { color: #e3c56d; }
  #params .row { margin: 8px 0; }
  .mismatch { color: #e3c56d; margin: 6px 0; }
</style>
</head>
<body>
<main>
  <canvas id="canvas"></canvas>
  <div id="transport">
    <button id="playBtn" title="pause/resume both runtimes">⏸</button>
    <span id="timeText">—</span>
    <span class="dim" style="color:var(--dim)">click to seek · keys/cues:
      drag (shift = fine), click to type/delete, dbl-click a lane to add ·
      wheel zooms · dbl-click gutter re-fits · ⚡ fires now</span>
  </div>
  <div id="timeline"><span class="dim">no scene yet</span></div>
  <div id="keyEdit" hidden>
    <label>t <input id="keyEditT" type="number" step="0.01"></label>
    <label>v <input id="keyEditV" type="number" step="0.01"></label>
    <button id="keyEditDel" title="delete this key/cue">✕</button>
  </div>
  <div id="statusbar">
    <span id="wasmStatus">preview: starting…</span>
    <span id="liveStatus">live: not connected</span>
  </div>
</main>
<aside>
  <h1>drift <span>editor</span></h1>

  <section>
    <h2>Preview scene</h2>
    <div class="row">
      <select id="sceneSelect"></select>
      <button id="newBtn" title="start a scratch scene (preview-only until saved)" disabled>New</button>
      <button id="saveBtn" title="write the scene into a folder on disk" disabled>Save…</button>
    </div>
  </section>

  <section>
    <h2>Live runtime</h2>
    <div class="row">
      <label for="port">ws://127.0.0.1:</label>
      <input id="port" type="number" value="7681" min="1" max="65535">
      <button id="connectBtn">Connect</button>
    </div>
  </section>

  <section>
    <h2>Parameters</h2>
    <div id="mismatch" class="mismatch" hidden></div>
    <div id="params"><span style="color:var(--dim)">none yet</span></div>
  </section>

  <section id="shaderSection" hidden>
    <h2>Shader — shaders/main.wgsl</h2>
    <textarea id="wgsl" rows="16" spellcheck="false"></textarea>
    <div class="row">
      <button id="applyShaderBtn">Apply (Ctrl-Enter)</button>
      <span id="wgslStatus"></span>
    </div>
  </section>
</aside>

<script>
'use strict';

// ---- wasm preview runtime (same artifacts as drift.html) -----------------

const SCENES = ['plasma', 'buoy', 'follow', 'trail', 'pulse'];
const query = new URLSearchParams(location.search);
const sceneName = query.get('scene') || SCENES[0];

const sceneSelect = document.getElementById('sceneSelect');
for (const name of SCENES) {
  const option = document.createElement('option');
  option.value = name;
  option.textContent = name;
  option.selected = name === sceneName;
  sceneSelect.appendChild(option);
}
sceneSelect.onchange = () => {
  if (sceneSelect.value === '_scratch') {
    return;
  }
  if (scratchActive &&
      !confirm('Discard the scratch scene? (Save… first to keep it)')) {
    sceneSelect.value = '_scratch';
    return;
  }
  query.set('scene', sceneSelect.value);
  query.delete('scratch');
  location.search = query.toString(); // runtime scene switch = reload
};

let wasm = null;          // { describe(), set(name, values) }
let wasmManifest = null;  // parsed describe once the scene is up

var Module = {
  canvas: document.getElementById('canvas'),
  arguments: [sceneName],
  onRuntimeInitialized() {
    const describe = Module.cwrap('drift_describe', 'string', []);
    const set = Module.cwrap('drift_set_parameter', 'number',
        ['string', 'number', 'number', 'number', 'number', 'number']);
    const time = Module.cwrap('drift_time', 'number', []);
    const seek = Module.cwrap('drift_seek', 'number', ['number']);
    const pause = Module.cwrap('drift_pause', null, ['number']);
    const reload = Module.cwrap('drift_reload', 'number', []);
    const source = Module.cwrap('drift_source', 'string', []);
    const load = Module.cwrap('drift_load', 'number', ['string']);
    const fire = Module.cwrap('drift_fire', 'number', ['string', 'string']);
    const errors = Module.cwrap('drift_errors', 'string', []);
    const writeAsset = Module.cwrap('drift_write_asset', 'number',
        ['string', 'string', 'string']);
    const readAsset = Module.cwrap('drift_read_asset', 'string', ['string']);
    const open = Module.cwrap('drift_open', 'number', ['string']);
    wasm = {
      describe,
      time,
      seek,
      pause,
      reload,
      source,
      load,
      fire,
      errors,
      writeAsset,
      readAsset,
      open,
      set(name, v) {
        return set(name, v[0] ?? 0, v[1] ?? 0, v[2] ?? 0, v[3] ?? 0, v.length);
      },
    };
    // The scene loads after the async adapter/device dance; poll briefly.
    const started = Date.now();
    const timer = setInterval(() => {
      const info = JSON.parse(wasm.describe());
      if (info.scene) {
        clearInterval(timer);
        wasmManifest = info;
        setStatus('wasmStatus', `preview: ${info.scene}`, 'ok');
        console.log(`editor: wasm scene '${info.scene}'`);
        document.getElementById('newBtn').disabled = false;
        document.getElementById('saveBtn').disabled = false;
        refreshPanel();
        fetchSource();
        // The live connection may have won the race; sync now rather than
        // waiting for the periodic check.
        syncClock(/*force=*/true);
        if (query.get('scratch')) {
          newScene();
        }
      } else if (Date.now() - started > 8000) {
        clearInterval(timer);
        setStatus('wasmStatus', 'preview: unavailable (WebGPU?)', 'bad');
        console.log('editor: wasm preview unavailable');
      }
    }, 200);
  },
};

// ---- live runtime (ControlServer protocol v0) -----------------------------

let live = null;          // WebSocket while connected
let liveManifest = null;
let nextId = 1;
let syncTimer = null;
const pending = new Map();
const currentValues = new Map(); // name -> values, for re-push after reload

// Preview adopts the live scene clock (always a forward snap for a fresh
// page; if the preview somehow leads — e.g. the live app was occluded and
// paused — drift_seek reloads the preview instance, honoring §9.7).
async function syncClock(force = false) {
  if (!live || !wasm || !wasmManifest) {
    return;
  }
  try {
    const { seconds } = await liveSend('time');
    const drift = wasm.time() - seconds;
    if (!force && Math.abs(drift) < 0.12) {
      return;
    }
    if (wasm.seek(seconds)) {
      for (const [name, values] of currentValues) {
        wasm.set(name, values); // reload reset them to scene defaults
      }
    }
    console.log(`editor: preview clock -> live ` +
                `(${seconds.toFixed(2)}s, drift ${drift.toFixed(2)}s)`);
  } catch (err) {
    console.log(`editor: clock sync: ${err}`);
  }
}

function liveSend(method, params) {
  return new Promise((resolve, reject) => {
    const id = nextId++;
    pending.set(id, { resolve, reject });
    live.send(JSON.stringify(params ? { id, method, params }
                                    : { id, method }));
  });
}

function connectLive(port) {
  const ws = new WebSocket(`ws://127.0.0.1:${port}`);
  setStatus('liveStatus', 'live: connecting…');
  ws.onopen = async () => {
    live = ws;
    document.getElementById('connectBtn').textContent = 'Disconnect';
    try {
      liveManifest = await liveSend('describe');
      setStatus('liveStatus', `live: ${liveManifest.scene ?? 'no scene'}`, 'ok');
      console.log(`editor: live scene '${liveManifest.scene}'`);
      // Preview mirrors the wallpaper's current state: values and clock.
      if (liveManifest.parameters) {
        for (const p of liveManifest.parameters) {
          applyParam(p.name, [].concat(p.value), { fromRemote: true });
        }
      }
      refreshPanel();
      await fetchSource();
      await syncClock(/*force=*/true);
      syncTimer = setInterval(syncClock, 2000);
    } catch (err) {
      setStatus('liveStatus', `live: ${err}`, 'bad');
    }
  };
  ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);
    if (data.id !== undefined && pending.has(data.id)) {
      const { resolve, reject } = pending.get(data.id);
      pending.delete(data.id);
      data.error !== undefined ? reject(data.error) : resolve(data.result);
      return;
    }
    if (data.event === 'parameter') {
      // Someone else (driftctl, another editor) changed it.
      applyParam(data.name, [].concat(data.value), { fromRemote: true });
    } else if (data.event === 'transport') {
      setPaused(data.paused, { fromRemote: true });
      if (wasm && Math.abs(wasm.time() - data.seconds) > 0.12) {
        previewSeek(data.seconds);
      }
    } else if (data.event === 'reload') {
      (async () => {
        liveManifest = await liveSend('describe');
        refreshPanel();
        await fetchSource();
        await syncClock(/*force=*/true);
      })();
    }
  };
  ws.onclose = () => {
    if (live === ws) {
      live = null;
      liveManifest = null;
      clearInterval(syncTimer);
      syncTimer = null;
      document.getElementById('connectBtn').textContent = 'Connect';
      setStatus('liveStatus', 'live: not connected');
      console.log('editor: live disconnected');
      refreshPanel();
    }
  };
  ws.onerror = () => setStatus('liveStatus', 'live: connection failed', 'bad');
}

document.getElementById('connectBtn').onclick = () => {
  if (live) {
    live.close();
  } else {
    connectLive(document.getElementById('port').value);
  }
};

// ---- parameter panel ------------------------------------------------------

const widgets = new Map(); // name -> { update(values) }

function activeManifest() {
  return liveManifest?.parameters ? liveManifest : wasmManifest;
}

// Fan an edit out to every attached runtime; remote-originated changes only
// update the preview and the widgets (the live app already applied them).
function applyParam(name, values, { fromRemote = false } = {}) {
  currentValues.set(name, values);
  if (wasm) {
    wasm.set(name, values);
  }
  if (live && !fromRemote) {
    liveSend('set', { name, value: values.length === 1 ? values[0] : values })
        .catch((err) => console.log(`editor: set ${name}: ${err}`));
  }
  widgets.get(name)?.update(values);
}

// ---- scene document (the editor owns it; runtimes consume) ----------------

let sceneSource = null; // parsed scene.json of the active target

async function fetchSource() {
  try {
    const text = live ? (await liveSend('source')).scene
                      : wasm ? wasm.source() : null;
    sceneSource = text ? JSON.parse(text) : null;
  } catch (err) {
    console.log(`editor: source: ${err}`);
    sceneSource = null;
  }
}

// Mirrors the edited timeline keys into the document, pushes it to every
// attached runtime (each keeps its old scene if validation fails), and
// re-applies parameter values to the preview (a load resets them).
async function pushDocument() {
  const manifest = activeManifest();
  if (!sceneSource || !manifest?.sequences) {
    return;
  }
  for (const seq of manifest.sequences) {
    const node = sceneSource.nodes?.find((n) => n.id === seq.id);
    if (!node) {
      continue;
    }
    node.tracks = seq.tracks.map((track) => track.kind === 'event'
      ? {
          ...node.tracks?.find((t) => t.name === track.name),
          name: track.name,
          kind: 'event',
          fires: track.fires.map((t) => +t.toFixed(3)),
        }
      : {
          ...node.tracks?.find((t) => t.name === track.name),
          name: track.name,
          kind: 'value',
          type: track.type,
          interpolate: track.interpolate,
          keys: track.keys.map((k) => ({
            t: +k.t.toFixed(3),
            value: Array.isArray(k.value)
                ? k.value.map((v) => +v.toFixed(4)) : +k.value.toFixed(4),
          })),
        });
  }
  const json = JSON.stringify(sceneSource, null, 2);
  if (wasm && wasm.load(json)) {
    for (const [name, values] of currentValues) {
      wasm.set(name, values);
    }
  }
  if (live) {
    try {
      await liveSend('load', { scene: json });
    } catch (err) {
      console.log(`editor: load rejected: ${err}`);
    }
  }
  console.log('editor: document pushed');
}

// ---- scene from scratch ----------------------------------------------------

const SCRATCH_ROOT = '/scenes/_scratch';
let scratchActive = false;

const TEMPLATE_SCENE = JSON.stringify({
  version: 1,
  name: 'Untitled',
  parameters: {
    tint: { type: 'vec3', default: [0.4, 0.6, 1.0], hint: 'color',
            label: 'Tint' },
  },
  nodes: [
    { id: 'seq', type: 'sequence', duration: 8, loop: true,
      tracks: [
        { name: 'level', kind: 'value', type: 'scalar',
          interpolate: 'smooth',
          keys: [{ t: 0, value: 0.2 }, { t: 4, value: 1 },
                 { t: 8, value: 0.2 }] },
      ],
      inputs: { time: '@time.seconds' } },
    { id: 'main', type: 'shader', shader: 'shaders/main.wgsl',
      inputs: { level: '@seq.level', tint: '$tint' } },
    { id: 'out', type: 'output', inputs: { color: '@main' } },
  ],
}, null, 2);

const TEMPLATE_WGSL = `struct Params {
    level: f32,
    tint: vec3<f32>,
}
@group(0) @binding(0) var<uniform> params: Params;

@fragment fn main(@location(0) uv: vec2f) -> @location(0) vec4f {
    let d = distance(uv, vec2f(0.5, 0.5));
    let glow = params.level * exp(-d * d * 8.0);
    return vec4f(params.tint * glow, 1.0);
}
`;

function newScene() {
  if (!wasm) {
    return;
  }
  if (live) {
    live.close(); // scratch is preview-only; a live app can't run it
  }
  wasm.writeAsset(SCRATCH_ROOT, 'scene.json', TEMPLATE_SCENE);
  wasm.writeAsset(SCRATCH_ROOT, 'shaders/main.wgsl', TEMPLATE_WGSL);
  if (!wasm.open(SCRATCH_ROOT)) {
    console.log(`editor: scratch open failed: ${wasm.errors()}`);
    return;
  }
  scratchActive = true;
  currentValues.clear();
  wasmManifest = JSON.parse(wasm.describe());
  sceneSource = JSON.parse(wasm.source());
  setStatus('wasmStatus', `preview: ${wasmManifest.scene} (scratch)`, 'ok');
  console.log('editor: scratch scene created');

  const select = document.getElementById('sceneSelect');
  if (!select.querySelector('option[value="_scratch"]')) {
    const option = document.createElement('option');
    option.value = '_scratch';
    option.textContent = '(scratch)';
    select.appendChild(option);
  }
  select.value = '_scratch';

  const shaderSection = document.getElementById('shaderSection');
  shaderSection.hidden = false;
  document.getElementById('wgsl').value =
      wasm.readAsset('shaders/main.wgsl');
  refreshPanel();
}

function applyShader() {
  if (!scratchActive || !wasm) {
    return;
  }
  wasm.writeAsset(SCRATCH_ROOT, 'shaders/main.wgsl',
                  document.getElementById('wgsl').value);
  // Reload the document so the shader re-reflects; ports may have changed.
  if (!wasm.load(JSON.stringify(sceneSource))) {
    setStatus('wgslStatus', wasm.errors() || 'load failed', 'bad');
    return;
  }
  for (const [name, values] of currentValues) {
    wasm.set(name, values);
  }
  wasmManifest = JSON.parse(wasm.describe());
  setStatus('wgslStatus', 'applied', 'ok');
  refreshPanel();
}

async function saveToFolder() {
  if (!sceneSource) {
    return;
  }
  try {
    const dir = await showDirectoryPicker({ mode: 'readwrite' });
    const sceneFile = await dir.getFileHandle('scene.json', { create: true });
    const writable = await sceneFile.createWritable();
    await writable.write(JSON.stringify(sceneSource, null, 2) + '\n');
    await writable.close();
    if (scratchActive) {
      const shaders = await dir.getDirectoryHandle('shaders', { create: true });
      const wgslFile = await shaders.getFileHandle('main.wgsl', { create: true });
      const wgslWritable = await wgslFile.createWritable();
      await wgslWritable.write(document.getElementById('wgsl').value);
      await wgslWritable.close();
    }
    console.log(`editor: saved to '${dir.name}'`);
    setStatus('wasmStatus',
              `preview: ${wasmManifest?.scene} — saved to ${dir.name}/`, 'ok');
  } catch (err) {
    if (err.name !== 'AbortError') {
      console.log(`editor: save: ${err}`);
    }
  }
}

document.getElementById('newBtn').onclick = newScene;
document.getElementById('saveBtn').onclick = saveToFolder;
document.getElementById('applyShaderBtn').onclick = applyShader;
document.getElementById('wgsl').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    applyShader();
  }
});

// ---- transport ------------------------------------------------------------

let paused = false;

// Seeks the preview only; drift_seek reloads on backward, which resets
// parameters to scene defaults — re-push what the panel currently shows.
function previewSeek(seconds) {
  if (!wasm) {
    return;
  }
  if (wasm.seek(seconds)) {
    for (const [name, values] of currentValues) {
      wasm.set(name, values);
    }
  }
}

function setPaused(value, { fromRemote = false } = {}) {
  paused = value;
  document.getElementById('playBtn').textContent = paused ? '▶' : '⏸';
  if (wasm) {
    wasm.pause(paused ? 1 : 0);
  }
  if (live && !fromRemote) {
    liveSend('pause', { paused }).catch((err) =>
        console.log(`editor: pause: ${err}`));
  }
}

function seekBoth(seconds) {
  previewSeek(seconds);
  if (live) {
    liveSend('seek', { time: seconds }).catch((err) =>
        console.log(`editor: seek: ${err}`));
  }
}

// "Fire now" (§16.1): inject a one-frame event fire into both runtimes.
function fireBoth(node, port) {
  if (wasm) {
    wasm.fire(node, port);
  }
  if (live) {
    liveSend('fire', { node, port }).catch((err) =>
        console.log(`editor: fire: ${err}`));
  }
  laneFlashes.set(`${node}/${port}`, performance.now());
}

document.getElementById('playBtn').onclick = () => setPaused(!paused);

// ---- timeline panel (§16.5 editor mapping; read-only in v0) --------------

const LANE_COLORS = ['#6aa1ff', '#7fd490', '#e3c56d', '#e0787d'];
const RULER_H = 18, LANE_H = 42, GUTTER_W = 96;
const FLASH_MS = 300;
let timelines = []; // { seq, canvas }
// Fires are one-frame phenomena; flashes are how the UI shows them.
const cueFlashes = new Map();  // seqId/track/cueIdx -> performance.now()
const laneFlashes = new Map(); // node/port -> performance.now()

function refreshTimeline() {
  const container = document.getElementById('timeline');
  const seqs = activeManifest()?.sequences ?? [];
  container.textContent = '';
  timelines = [];
  if (!seqs.length) {
    container.innerHTML =
        '<span class="dim">no sequence nodes in this scene</span>';
    return;
  }
  for (const seq of seqs) {
    const header = document.createElement('h3');
    header.textContent =
        `${seq.id} — ${seq.duration}s${seq.loop ? ' · loop' : ''}`;
    const canvas = document.createElement('canvas');
    const tl = { seq, canvas, hits: [], laneRanges: [] };
    canvas.onmousedown = (e) => {
      const button = (tl.fireButtons || []).find(
          (b) => e.offsetX >= b.x0 && e.offsetX <= b.x1 &&
                 e.offsetY >= b.y0 && e.offsetY <= b.y1);
      if (button) {
        fireBoth(seq.id, seq.tracks[button.lane].name);
        suppressClick = true;
        e.preventDefault();
        return;
      }
      const hit = tl.hits.find((h) => Math.abs(h.x - e.offsetX) < 7 &&
                                      Math.abs(h.y - e.offsetY) < 7);
      if (!hit) {
        return;
      }
      dragState = { tl, lane: hit.lane, keyIdx: hit.keyIdx, comp: hit.comp,
                    lastX: e.clientX, lastY: e.clientY, moved: false };
      suppressClick = true;
      e.preventDefault();
    };
    canvas.addEventListener('wheel', (e) => {
      // Zoom a lane's value scale around the value under the cursor;
      // over the name gutter the wheel still scrolls the strip.
      if (e.offsetX < GUTTER_W) {
        return;
      }
      const lane = Math.floor((e.offsetY - RULER_H) / LANE_H);
      if (lane < 0 || lane >= seq.tracks.length) {
        return;
      }
      e.preventDefault();
      const range = laneRangeMemory.get(
          `${activeManifest()?.scene}/${seq.id}/${seq.tracks[lane].name}`);
      const geom = tl.laneRanges[lane];
      if (!range || !geom) {
        return;
      }
      const span = range.vmax - range.vmin;
      const factor = e.deltaY > 0 ? 1.2 : 1 / 1.2;
      if ((span < 1e-6 && factor < 1) || (span > 1e6 && factor > 1)) {
        return;
      }
      const f = (geom.bottom - e.offsetY) / (geom.bottom - geom.top);
      const pivot = range.vmin + f * span;
      range.vmin = pivot + (range.vmin - pivot) * factor;
      range.vmax = pivot + (range.vmax - pivot) * factor;
    }, { passive: false });
    canvas.onclick = (e) => {
      if (suppressClick) {
        suppressClick = false;
        return;
      }
      const plotW = canvas.clientWidth - GUTTER_W;
      const t = ((e.offsetX - GUTTER_W) / plotW) * seq.duration;
      seekBoth(Math.min(Math.max(t, 0), seq.duration));
    };
    canvas.ondblclick = (e) => {
      const lane = Math.floor((e.offsetY - RULER_H) / LANE_H);
      if (lane < 0 || lane >= seq.tracks.length) {
        return;
      }
      const track = seq.tracks[lane];
      if (e.offsetX < GUTTER_W) {
        // Gutter: re-fit this lane's scale to its current keys.
        laneRangeMemory.delete(
            `${activeManifest()?.scene}/${seq.id}/${track.name}`);
        return;
      }
      // Plot area: insert a cue / a key on the current curve at that time.
      const plotW = canvas.clientWidth - GUTTER_W;
      const t = Math.min(Math.max(
          ((e.offsetX - GUTTER_W) / plotW) * seq.duration, 0), seq.duration);
      if (track.kind === 'event') {
        const cue = Math.min(t, seq.duration - 0.01);
        if (track.fires.some((f) => Math.abs(f - cue) < 0.02)) {
          return;
        }
        track.fires.push(+cue.toFixed(3));
        track.fires.sort((a, b) => a - b);
      } else {
        if (track.keys.some((k) => Math.abs(k.t - t) < 0.02)) {
          return;
        }
        const value = sampleTrack(track, t);
        track.keys.push({
          t: +t.toFixed(3),
          value: value.length === 1 ? value[0] : value,
        });
        track.keys.sort((a, b) => a.t - b.t);
      }
      pushDocument();
    };
    container.appendChild(header);
    container.appendChild(canvas);
    timelines.push(tl);
  }
  console.log(`editor: timeline: ${seqs.length} sequence(s)`);
}

// Track sampling mirrors core semantics (§9.9): hold/linear/smooth, first
// key's value before it, last key's after, no wrap interpolation.
function sampleTrack(track, t) {
  const keys = track.keys;
  let k = 0;
  while (k + 1 < keys.length && keys[k + 1].t <= t) {
    k++;
  }
  const a = [].concat(keys[k].value);
  if (track.interpolate === 'hold' || k + 1 >= keys.length ||
      t <= keys[k].t) {
    return a;
  }
  const b = [].concat(keys[k + 1].value);
  let f = (t - keys[k].t) / (keys[k + 1].t - keys[k].t);
  if (track.interpolate === 'smooth') {
    f = f * f * (3 - 2 * f);
  }
  return a.map((v, i) => v + (b[i] - v) * f);
}

// Key dragging: t moves between neighboring keys; the value follows the
// vertical axis using the lane range frozen at grab time (so the lane
// rescaling under the edit doesn't warp the mapping). Pushed on release.
let dragState = null;
let suppressClick = false;

// Lane scales are fitted ONCE from the authored keys and then left alone —
// any fit-to-data policy pins the data's max at the lane top, so dragging a
// key up would always snap it back to the same pixel. Edited values beyond
// the original range draw outside the lane band; double-click a lane to
// re-fit its scale. Keyed per scene/sequence/track.
const laneRangeMemory = new Map();

// Incremental deltas (not absolute cursor mapping): no jump on grab, and
// it composes with mid-drag lane zooming. Shift = 10x finer.
window.addEventListener('mousemove', (e) => {
  if (!dragState) {
    return;
  }
  const { tl, lane, keyIdx, comp } = dragState;
  const seq = tl.seq;
  const track = seq.tracks[lane];
  const geom = tl.laneRanges[lane];
  const fine = e.shiftKey ? 0.1 : 1;
  const dx = e.clientX - dragState.lastX;
  const dy = e.clientY - dragState.lastY;
  dragState.lastX = e.clientX;
  dragState.lastY = e.clientY;

  const plotW = tl.canvas.clientWidth - GUTTER_W;
  const dt = (dx / plotW) * seq.duration * fine;

  if (comp < 0) {
    // Event cue: time only, ascending, within [0, duration).
    const fires = track.fires;
    const lo = keyIdx > 0 ? fires[keyIdx - 1] + 0.01 : 0;
    const hi = keyIdx < fires.length - 1 ? fires[keyIdx + 1] - 0.01
                                         : seq.duration - 0.01;
    fires[keyIdx] = Math.min(Math.max(fires[keyIdx] + dt, lo),
                             Math.max(lo, hi));
    dragState.moved = true;
    return;
  }

  const keys = track.keys;
  const t = keys[keyIdx].t + dt;
  const lo = keyIdx > 0 ? keys[keyIdx - 1].t + 0.01 : 0;
  const hi = keyIdx < keys.length - 1 ? keys[keyIdx + 1].t - 0.01
                                      : seq.duration;
  keys[keyIdx].t = Math.min(Math.max(t, lo), Math.max(lo, hi));

  const dv = (-dy / (geom.bottom - geom.top)) *
             (geom.vmax - geom.vmin) * fine;
  if (Array.isArray(keys[keyIdx].value)) {
    keys[keyIdx].value[comp] += dv;
  } else {
    keys[keyIdx].value += dv;
  }
  dragState.moved = true;
});

window.addEventListener('mouseup', (e) => {
  if (dragState) {
    if (dragState.moved) {
      pushDocument();
    } else {
      // A click on a key (no movement): type the values instead.
      const { tl, lane, keyIdx, comp } = dragState;
      openKeyEditor(tl, lane, keyIdx, comp, e.clientX, e.clientY);
    }
    dragState = null;
  }
});

// ---- numeric key editor (click a key) -------------------------------------

const keyEdit = document.getElementById('keyEdit');
let keyEditState = null;

function openKeyEditor(tl, lane, keyIdx, comp, screenX, screenY) {
  const track = tl.seq.tracks[lane];
  const isCue = comp < 0;
  keyEditState = { tl, lane, keyIdx, comp };
  document.getElementById('keyEditT').value = isCue
      ? +track.fires[keyIdx].toFixed(3)
      : +track.keys[keyIdx].t.toFixed(3);
  const valueInput = document.getElementById('keyEditV');
  valueInput.parentElement.hidden = isCue; // cues have no value
  if (!isCue) {
    valueInput.value =
        +[].concat(track.keys[keyIdx].value)[comp].toFixed(4);
  }
  keyEdit.hidden = false;
  keyEdit.style.left =
      Math.min(screenX + 10, innerWidth - 200) + 'px';
  keyEdit.style.top = Math.max(screenY - 44, 4) + 'px';
  const focusInput = isCue ? document.getElementById('keyEditT') : valueInput;
  focusInput.focus();
  focusInput.select();
}

function closeKeyEditor(apply) {
  if (keyEditState && apply) {
    const { tl, lane, keyIdx, comp } = keyEditState;
    const track = tl.seq.tracks[lane];
    const t = parseFloat(document.getElementById('keyEditT').value);
    if (comp < 0) {
      if (!Number.isNaN(t)) {
        const fires = track.fires;
        const lo = keyIdx > 0 ? fires[keyIdx - 1] + 0.01 : 0;
        const hi = keyIdx < fires.length - 1 ? fires[keyIdx + 1] - 0.01
                                             : tl.seq.duration - 0.01;
        fires[keyIdx] = Math.min(Math.max(t, lo), Math.max(lo, hi));
      }
    } else {
      const keys = track.keys;
      const key = keys[keyIdx];
      const v = parseFloat(document.getElementById('keyEditV').value);
      if (!Number.isNaN(t)) {
        const lo = keyIdx > 0 ? keys[keyIdx - 1].t + 0.01 : 0;
        const hi = keyIdx < keys.length - 1 ? keys[keyIdx + 1].t - 0.01
                                            : tl.seq.duration;
        key.t = Math.min(Math.max(t, lo), Math.max(lo, hi));
      }
      if (!Number.isNaN(v)) {
        if (Array.isArray(key.value)) {
          key.value[comp] = v;
        } else {
          key.value = v;
        }
      }
    }
    pushDocument();
  }
  keyEditState = null;
  keyEdit.hidden = true;
}

document.getElementById('keyEditDel').onclick = () => {
  if (!keyEditState) {
    return;
  }
  const { tl, lane, keyIdx, comp } = keyEditState;
  const track = tl.seq.tracks[lane];
  const list = comp < 0 ? track.fires : track.keys;
  if (list.length <= 1) {
    console.log('editor: cannot delete the last key/cue (§13 requires one)');
    return;
  }
  list.splice(keyIdx, 1);
  keyEditState = null;
  keyEdit.hidden = true;
  pushDocument();
};

keyEdit.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    closeKeyEditor(true);
  } else if (e.key === 'Escape') {
    closeKeyEditor(false);
  }
});
// Clicking anywhere else dismisses (capture: fires before canvas handlers,
// so clicking another key closes this editor and opens that one).
window.addEventListener('mousedown', (e) => {
  if (keyEditState && !keyEdit.contains(e.target)) {
    closeKeyEditor(false);
  }
}, true);
document.getElementById('timeline').addEventListener('scroll', () => {
  if (keyEditState) {
    closeKeyEditor(false);
  }
});

function drawTimeline(tl, playTime) {
  const { seq, canvas } = tl;
  const dpr = devicePixelRatio || 1;
  const cssW = canvas.clientWidth || canvas.parentElement.clientWidth;
  const cssH = RULER_H + seq.tracks.length * LANE_H;
  canvas.style.height = cssH + 'px';
  if (canvas.width !== Math.round(cssW * dpr) ||
      canvas.height !== Math.round(cssH * dpr)) {
    canvas.width = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
  }
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, cssW, cssH);

  const plotW = cssW - GUTTER_W;
  const xOf = (t) => GUTTER_W + (t / seq.duration) * plotW;

  // Ruler: a tick per second, labels as space allows.
  ctx.font = '10px system-ui';
  ctx.fillStyle = '#8a8f98';
  ctx.strokeStyle = '#2c3038';
  const labelEvery = Math.max(1, Math.ceil(seq.duration / (plotW / 42)));
  for (let s = 0; s <= seq.duration; s++) {
    const x = xOf(s);
    ctx.beginPath();
    ctx.moveTo(x, RULER_H - 5);
    ctx.lineTo(x, cssH);
    ctx.stroke();
    if (s % labelEvery === 0) {
      ctx.fillText(`${s}s`, x + 3, RULER_H - 7);
    }
  }

  tl.hits = [];
  tl.laneRanges = [];
  tl.fireButtons = [];
  const now = performance.now();
  seq.tracks.forEach((track, lane) => {
    const top = RULER_H + lane * LANE_H;
    const bottom = top + LANE_H - 8;
    const height = bottom - (top + 8);

    ctx.strokeStyle = '#2c3038';
    ctx.beginPath();
    ctx.moveTo(0, top + LANE_H);
    ctx.lineTo(cssW, top + LANE_H);
    ctx.stroke();
    ctx.fillStyle = '#d6d9de';
    ctx.font = '11px system-ui';
    ctx.fillText(track.name, 8, top + 14);
    ctx.fillStyle = '#8a8f98';
    ctx.font = '9px system-ui';
    ctx.fillText(track.kind === 'event' ? 'event' : track.interpolate,
                 8, top + 26);

    if (track.kind === 'event') {
      // Cue markers on a center line; drag moves them in time only. The ⚡
      // in the gutter is the "fire now" verb (§16.1); markers flash when
      // the playhead crosses them or a manual fire lands.
      const y = (top + 8 + bottom) / 2;
      tl.laneRanges[lane] = { vmin: 0, vmax: 1, top: top + 8, bottom };
      ctx.fillStyle = '#e3c56d';
      ctx.font = '12px system-ui';
      ctx.fillText('⚡', GUTTER_W - 22, y + 4);
      tl.fireButtons.push({ x0: GUTTER_W - 28, y0: y - 10,
                            x1: GUTTER_W - 8, y1: y + 10, lane });
      ctx.strokeStyle = '#2c3038';
      ctx.beginPath();
      ctx.moveTo(GUTTER_W, y);
      ctx.lineTo(cssW, y);
      ctx.stroke();
      const laneFlash =
          now - (laneFlashes.get(`${seq.id}/${track.name}`) || 0) < FLASH_MS;
      track.fires.forEach((cue, keyIdx) => {
        const flash = laneFlash ||
            now - (cueFlashes.get(`${seq.id}/${track.name}/${keyIdx}`) || 0) <
                FLASH_MS;
        const x = xOf(cue);
        const r = flash ? 8 : 5;
        ctx.fillStyle = flash ? '#ffffff' : '#e3c56d';
        ctx.beginPath();
        ctx.moveTo(x, y - r);
        ctx.lineTo(x + r, y);
        ctx.lineTo(x, y + r);
        ctx.lineTo(x - r, y);
        ctx.fill();
        tl.hits.push({ x, y, lane, keyIdx, comp: -1 });
        if (dragState && dragState.tl === tl && dragState.lane === lane &&
            dragState.keyIdx === keyIdx) {
          ctx.fillStyle = '#d6d9de';
          ctx.font = '10px system-ui';
          ctx.fillText(`${cue.toFixed(2)}s`, x + 8, y - 7);
        }
      });
      return;
    }

    // Stable lane scale: first fit wins (see laneRangeMemory above).
    const memoryKey = `${activeManifest()?.scene}/${seq.id}/${track.name}`;
    let range = laneRangeMemory.get(memoryKey);
    if (!range) {
      const flat = track.keys.flatMap((key) => [].concat(key.value));
      let lo = Math.min(...flat), hi = Math.max(...flat);
      if (lo === hi) {
        lo -= 0.5;
        hi += 0.5;
      }
      const pad = (hi - lo) * 0.12;
      range = { vmin: lo - pad, vmax: hi + pad };
      laneRangeMemory.set(memoryKey, range);
    }
    const { vmin, vmax } = range;
    tl.laneRanges[lane] = { vmin, vmax, top: top + 8, bottom };
    const yOf = (v) => bottom - ((v - vmin) / (vmax - vmin)) * height;

    // The scale itself, so identical shapes at different scales read
    // differently.
    ctx.fillStyle = '#8a8f98';
    ctx.font = '9px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText((+vmax.toFixed(2)).toString(), cssW - 4, top + 14);
    ctx.fillText((+vmin.toFixed(2)).toString(), cssW - 4, bottom);
    ctx.textAlign = 'left';

    const arity = [].concat(track.keys[0].value).length;
    for (let c = 0; c < arity; c++) {
      ctx.strokeStyle = LANE_COLORS[c];
      ctx.beginPath();
      // Sampled polyline reproduces hold steps and smooth curves alike.
      const steps = Math.max(64, plotW / 3);
      for (let i = 0; i <= steps; i++) {
        const t = (i / steps) * seq.duration;
        const y = yOf(sampleTrack(track, t)[c]);
        i ? ctx.lineTo(xOf(t), y) : ctx.moveTo(xOf(t), y);
        if (track.interpolate === 'hold') {
          // Re-sample just past each step edge to keep risers vertical.
          const next = sampleTrack(track, Math.min(t + 1e-9, seq.duration));
          ctx.lineTo(xOf(t), yOf(next[c]));
        }
      }
      ctx.stroke();
      ctx.fillStyle = LANE_COLORS[c];
      track.keys.forEach((key, keyIdx) => {
        const value = [].concat(key.value)[c];
        const x = xOf(key.t), y = yOf(value);
        ctx.beginPath();
        ctx.moveTo(x, y - 4);
        ctx.lineTo(x + 4, y);
        ctx.lineTo(x, y + 4);
        ctx.lineTo(x - 4, y);
        ctx.fill();
        tl.hits.push({ x, y, lane, keyIdx, comp: c });
        if (dragState && dragState.tl === tl && dragState.lane === lane &&
            dragState.keyIdx === keyIdx && dragState.comp === c) {
          ctx.fillStyle = '#d6d9de';
          ctx.font = '10px system-ui';
          ctx.fillText(`${key.t.toFixed(2)}s · ${value.toFixed(2)}`,
                       x + 8, y - 7);
          ctx.fillStyle = LANE_COLORS[c];
        }
      });
    }
  });

  if (playTime !== null) {
    const local = seq.loop
        ? ((playTime % seq.duration) + seq.duration) % seq.duration
        : Math.min(Math.max(playTime, 0), seq.duration);
    ctx.strokeStyle = '#e0787d';
    ctx.beginPath();
    ctx.moveTo(xOf(local), 4);
    ctx.lineTo(xOf(local), cssH);
    ctx.stroke();
  }
}

(function tickTimelines() {
  const t = wasm && wasmManifest ? wasm.time() : null;
  document.getElementById('timeText').textContent =
      t !== null ? `${t.toFixed(2)}s` : '—';
  for (const timeline of timelines) {
    // Flash cues the playhead crossed (mirrors the §9.9 crossing rules).
    if (t !== null) {
      const seq = timeline.seq;
      const local = seq.loop
          ? ((t % seq.duration) + seq.duration) % seq.duration
          : Math.min(Math.max(t, 0), seq.duration);
      const prev = timeline.prevLocal;
      if (prev !== undefined && local !== prev) {
        const wrapped = local < prev;
        seq.tracks.forEach((track) => {
          if (track.kind !== 'event') {
            return;
          }
          track.fires.forEach((cue, cueIdx) => {
            const fired = wrapped ? cue > prev || cue <= local
                                  : cue > prev && cue <= local;
            if (fired) {
              cueFlashes.set(`${seq.id}/${track.name}/${cueIdx}`,
                             performance.now());
            }
          });
        });
      }
      timeline.prevLocal = local;
    }
    drawTimeline(timeline, t);
  }
  requestAnimationFrame(tickTimelines);
})();

function refreshPanel() {
  refreshTimeline();
  const manifest = activeManifest();
  const container = document.getElementById('params');
  const mismatch = document.getElementById('mismatch');
  mismatch.hidden = !(wasmManifest && liveManifest?.scene &&
                      wasmManifest.scene !== liveManifest.scene);
  if (!mismatch.hidden) {
    mismatch.textContent = `preview shows '${wasmManifest.scene}' but the ` +
                           `live scene is '${liveManifest.scene}'`;
  }
  container.textContent = '';
  widgets.clear();
  if (!manifest?.parameters?.length) {
    container.innerHTML = '<span style="color:var(--dim)">' +
        (manifest ? 'scene has no parameters' : 'none yet') + '</span>';
    return;
  }
  for (const param of manifest.parameters) {
    container.appendChild(buildWidget(param));
  }
}

function buildWidget(param) {
  const row = document.createElement('div');
  row.className = 'row';
  const label = document.createElement('label');
  label.textContent = param.label || param.name;
  label.title = param.name;
  row.appendChild(label);

  const values = [].concat(param.value);
  const isColor = param.hint === 'color' &&
                  (param.type === 'vec3' || param.type === 'vec4');

  if (param.type === 'scalar') {
    const min = param.min ?? 0;
    const max = param.max ?? 1;
    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min = min;
    slider.max = max;
    slider.step = param.step || (max - min) / 1000;
    const number = document.createElement('input');
    number.type = 'number';
    number.step = slider.step;
    const push = (v) => applyParam(param.name, [Number(v)]);
    slider.oninput = () => push(slider.value);
    number.onchange = () => push(number.value);
    row.appendChild(slider);
    row.appendChild(number);
    widgets.set(param.name, {
      update([v]) { slider.value = v; number.value = +v.toFixed(4); },
    });
  } else if (isColor) {
    const color = document.createElement('input');
    color.type = 'color';
    const alpha = param.type === 'vec4' ? document.createElement('input') : null;
    if (alpha) {
      alpha.type = 'number';
      alpha.min = 0;
      alpha.max = 1;
      alpha.step = 0.01;
      alpha.title = 'alpha';
    }
    const current = () => {
      const rgb = [1, 3, 5].map(
          (i) => parseInt(color.value.slice(i, i + 2), 16) / 255);
      return alpha ? [...rgb, Number(alpha.value)] : rgb;
    };
    color.oninput = () => applyParam(param.name, current());
    if (alpha) {
      alpha.onchange = () => applyParam(param.name, current());
      row.appendChild(alpha);
    }
    row.insertBefore(color, alpha);
    widgets.set(param.name, {
      update(v) {
        color.value = '#' + v.slice(0, 3).map((c) =>
            Math.round(Math.max(0, Math.min(1, c)) * 255)
                .toString(16).padStart(2, '0')).join('');
        if (alpha) alpha.value = +(v[3] ?? 1).toFixed(2);
      },
    });
  } else {
    const arity = { vec2: 2, vec3: 3, vec4: 4 }[param.type] ?? values.length;
    const inputs = [];
    for (let i = 0; i < arity; ++i) {
      const input = document.createElement('input');
      input.type = 'number';
      input.step = param.step || 0.01;
      input.onchange = () =>
          applyParam(param.name, inputs.map((box) => Number(box.value)));
      inputs.push(input);
      row.appendChild(input);
    }
    widgets.set(param.name, {
      update(v) { inputs.forEach((box, i) => box.value = +v[i].toFixed(4)); },
    });
  }

  widgets.get(param.name).update(values);
  return row;
}

function setStatus(id, text, cls) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = cls || '';
}

// ?connect=PORT auto-connects (handy for tests and a fixed dev setup).
if (query.get('connect')) {
  connectLive(query.get('connect'));
}
</script>
<script async src="drift.js"></script>
